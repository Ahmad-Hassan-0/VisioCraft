<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - VisioCraft AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Overlook',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#18429D;}
.card{display:flex;width:min(1200px,96vw);height:680px;border-radius:18px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,0.4);}
.left{width:55%;background:#fff;display:flex;flex-direction:column;justify-content:center;padding:60px 60px;}
h1{font-size:2rem;font-weight:700;color:#111;margin-bottom:8px;}
.sub{font-size:.9rem;color:#555;margin-bottom:32px;}
label{display:block;font-size:.82rem;font-weight:600;color:#222;margin-bottom:7px;}
input[type=email]{width:100%;padding:13px 14px;border:1px solid #d0d5dd;border-radius:8px;font-size:.9rem;outline:none;transition:border-color .2s;margin-bottom:24px;}
input:focus{border-color:#18429D;}
.btn{width:100%;padding:14px;background:#18429D;color:#fff;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;}
.btn:hover{background:#132f74;}
.switch{text-align:center;margin-top:24px;font-size:.85rem;color:#555;}
.switch a{color:#18429D;font-weight:600;text-decoration:none;}
#msg{font-size:.78rem;text-align:center;margin-top:10px;min-height:16px;}
.right{width:45%;background:#2E8FAD url('{{ url_for("static", filename="bg.png") }}') center/cover no-repeat;}
</style>
</head>
<body>
<div class="card">
  <div class="left">
    <h1>Forgot Password?</h1>
    <p class="sub">We'll send a reset link to your email.</p>
    <label>Email address</label>
    <input type="email" id="email" placeholder="Enter your email">
    <button class="btn" id="btn">Send Reset Link</button>
    <div id="msg"></div>
    <div class="switch"><a href="/login">← Back to Login</a></div>
  </div>
  <div class="right"></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
const auth=getAuth(initializeApp({apiKey:"AIzaSyBJYEpbNJFWmfG6-ZlO_gt55LGxBW64T5A",authDomain:"visiocraft-d55a9.firebaseapp.com",projectId:"visiocraft-d55a9",storageBucket:"visiocraft-d55a9.firebasestorage.app",messagingSenderId:"183906867290",appId:"1:183906867290:web:30aac496a1a345a75ca063"}));
const msg=document.getElementById('msg');
document.getElementById('btn').onclick=async()=>{try{await sendPasswordResetEmail(auth,document.getElementById('email').value);msg.style.color='#18429D';msg.innerText='Reset link sent! Check your inbox.';}catch(e){msg.style.color='red';msg.innerText=e.message;}};
</script>
</body>
</html>
